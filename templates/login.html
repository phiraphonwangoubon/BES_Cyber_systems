<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BES Cyber System Assessment | Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #061b78;
            --deep-blue: #031052;
            --royal-blue: #12229d;
            --gold: #ffc928;
            --bg: #f5f7fb;
            --text: #172033;
            --muted: #667085;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Inter", "Noto Sans Thai", sans-serif;
            background:
                radial-gradient(circle at 10% 10%, rgba(255,201,40,0.25), transparent 30%),
                radial-gradient(circle at 90% 10%, rgba(6,27,120,0.2), transparent 35%),
                linear-gradient(135deg, #f7f9ff 0%, #eef3fb 100%);
        }

        .login-page {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            min-height: 100vh;
        }

        /* LEFT SIDE */
        .hero {
            background: linear-gradient(135deg, var(--primary-blue), var(--deep-blue));
            color: white;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 450px;
            height: 450px;
            background: var(--gold);
            border-radius: 40px;
            transform: rotate(15deg);
            top: -150px;
            left: -150px;
            opacity: 0.9;
        }

        .hero-content {
            position: relative;
            z-index: 2;
        }

        .egat-logo {
            height: 70px;
            margin-bottom: 30px;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.25));
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .hero h1 span {
            color: var(--gold);
        }

        .hero p {
            color: #dbe5ff;
            line-height: 1.8;
        }

        /* RIGHT SIDE */
        .login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .card-top {
            height: 6px;
            background: linear-gradient(90deg, var(--gold), var(--primary-blue));
        }

        .login-body {
            padding: 35px;
            text-align: center;
        }

        .login-body img {
            height: 60px;
            margin-bottom: 15px;
        }

        .login-title {
            font-weight: 900;
            color: var(--primary-blue);
        }

        .login-desc {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-label {
            text-align: left;
            width: 100%;
            font-weight: 700;
            font-size: 13px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #cfd8e6;
        }

        .form-control:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(6,27,120,0.15);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-blue), var(--royal-blue));
            color: white;
            border: none;
            border-radius: 999px;
            padding: 12px;
            font-weight: 800;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #071f8c, #182fc7);
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: var(--muted);
        }

        @media (max-width: 900px) {
            .login-page {
                grid-template-columns: 1fr;
            }

            .hero {
                padding: 30px;
            }

            .hero h1 {
                font-size: 30px;
            }
        }
    </style>
</head>

<body>

<div class="login-page">

    <!-- LEFT -->
    <div class="hero">
        <div class="hero-content">

            <img src="https://energysolutions.egat.co.th/images/SES-Photos/100-Home/105-Logo/EGAT-01.png"
                 class="egat-logo">

            <h1>
                Cyber System<br>
                <span>Assessment Platform</span>
            </h1>

            <p>
                Official system for recording and managing BES Cyber System assessment data securely

            </p>

        </div>
    </div>

    <!-- RIGHT -->
    <div class="login-section">

        <div class="login-card">
            <div class="card-top"></div>

            <div class="login-body">

                <!-- LOGO ด้านบนฟอร์ม -->
                <img src="https://energysolutions.egat.co.th/images/SES-Photos/100-Home/105-Logo/EGAT-01.png">

                <h3 class="login-title">Sign In</h3>
                <p class="login-desc">Authorized access only</p>

                <form method="POST">

                    <div class="mb-3 text-start">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>

                    <div class="mb-3 text-start">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>

                    <button type="submit" class="btn btn-login w-100">
                        Login to System
                    </button>

                </form>

                <div class="footer">
                    Electricity Generating Authority of Thailand
                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
